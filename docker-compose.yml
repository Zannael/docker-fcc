services:
  free-claude-code:
    build: .
    container_name: free-claude-code
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped